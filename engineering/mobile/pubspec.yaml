name: pao_mobile
description: PAO - AI Companion Mobile Application
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Navigation
  go_router: ^14.0.1
  
  # Networking
  dio: ^5.4.3+1
  grpc: ^3.2.4
  protobuf: ^3.1.0
  connectrpc: ^1.2.0
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.2
  
  # UI/UX
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  material_design_icons_flutter: ^7.0.7296
  
  # Audio/Voice
  just_audio: ^0.9.36
  record: ^5.0.4
  audio_session: ^0.1.18
  permission_handler: ^11.3.0
  
  # Push Notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.18
  flutter_local_notifications: ^17.2.2
  
  # Analytics/Crashlytics
  firebase_analytics: ^10.8.8
  firebase_crashlytics: ^3.5.6
  firebase_performance: ^0.9.4+8
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  collection: ^1.18.0
  path_provider: ^2.1.2
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5
  share_plus: ^10.0.2
  clipboard: ^0.1.3
  
  # Security
  flutter_jailbreak_detection: ^1.1.0
  local_auth: ^2.2.0
  
  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3
  bloc_test: ^9.1.7
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500

melos:
  scripts:
    analyze: melos exec -- flutter analyze
    test: melos exec -- flutter test --coverage
    format: melos exec -- dart format .
    generate: melos exec -- dart run build_runner build --delete-conflicting-outputs
    watch: melos exec -- dart run build_runner watch --delete-conflicting-outputs